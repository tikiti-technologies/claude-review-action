name: Gemini Review (reusable)

on:
  workflow_call:
    inputs:
      stack:
        description: 'Stack-specific prompt to load from prompts/<stack>.md (e.g. nestjs-fastify-drizzle)'
        type: string
        required: true
      runner:
        description: 'JSON-encoded runs-on value (e.g. "ubuntu-latest" or "[\"self-hosted\",\"aws\",\"spot\"]")'
        type: string
        default: '"ubuntu-latest"'
      ref:
        description: 'Pinned ref of this central repo to load prompts from (tag / branch / sha)'
        type: string
        default: 'v1'
      model:
        description: 'Gemini model name'
        type: string
        default: 'gemini-2.5-flash'
      max_total_lines:
        description: 'Max total source lines included in review payload'
        type: number
        default: 5000
      max_per_file:
        description: 'Skip files larger than this many lines'
        type: number
        default: 1000
      max_files:
        description: 'Max number of files included in review payload'
        type: number
        default: 20
      slack_notify:
        description: 'Whether to send a Slack notification after the run'
        type: boolean
        default: false
      extra_prompt:
        description: 'Optional repo-specific addendum appended after the stack prompt. Use this for short inline notes; for long-form content prefer extra_prompt_path.'
        type: string
        default: ''
      extra_prompt_path:
        description: 'Optional path (relative to the consumer repo root) to a markdown file whose contents are appended after the stack prompt — e.g. .github/review-extras.md. Cleaner than a multi-line YAML string for long-form repo-specific conventions. If both extra_prompt and extra_prompt_path are set, both are appended (file contents first, then inline string).'
        type: string
        default: ''
    secrets:
      gemini_api_key:
        required: true
      slack_webhook_url:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@gemini'))
    runs-on: ${{ fromJSON(inputs.runner) }}
    concurrency:
      group: gemini-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout review action repo (prompts)
        uses: actions/checkout@v6
        with:
          repository: tikiti-technologies/claude-review-action
          ref: ${{ inputs.ref }}
          path: .claude-review-action
          token: ${{ github.token }}

      - name: Install GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            if command -v dnf &> /dev/null; then
              sudo dnf install -y 'dnf-command(config-manager)' || true
              sudo dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
              sudo dnf install -y gh
            elif command -v apt-get &> /dev/null; then
              type -p curl >/dev/null || sudo apt-get install -y curl
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
              sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
              sudo apt-get update && sudo apt-get install -y gh
            fi
          fi

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number || github.event.issue.number }} > /tmp/pr-diff.txt
          echo "lines=$(wc -l < /tmp/pr-diff.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Collect changed files
        id: files
        run: |
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD \
            | grep -v -E '\.(lock|min\.(js|css)|map|snap|png|jpg|jpeg|gif|svg|ico|woff|ttf|eot)$' \
            | grep -v -E '(package-lock\.json|pnpm-lock\.yaml|yarn\.lock|dist/|node_modules/|coverage/)' \
            > /tmp/changed-files.txt || true
          echo "count=$(wc -l < /tmp/changed-files.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Build review payload
        if: steps.files.outputs.count > 0
        env:
          MAX_TOTAL_LINES: ${{ inputs.max_total_lines }}
          MAX_PER_FILE: ${{ inputs.max_per_file }}
          MAX_FILES: ${{ inputs.max_files }}
        run: |
          set -euo pipefail
          ROOT=".claude-review-action"
          BASE="$ROOT/prompts/base.md"
          STACK="$ROOT/prompts/${{ inputs.stack }}.md"

          if [ ! -f "$BASE" ] || [ ! -f "$STACK" ]; then
            echo "::error::base or stack prompt not found"
            exit 1
          fi

          CODE=""
          TOTAL_LINES=0
          FILES_SENT=0

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            [ "$FILES_SENT" -ge "$MAX_FILES" ] && break
            LINES=$(wc -l < "$f" | tr -d ' ')
            [ "$LINES" -gt "$MAX_PER_FILE" ] && continue
            [ "$((TOTAL_LINES + LINES))" -gt "$MAX_TOTAL_LINES" ] && break

            CODE+="--- $f ---
          $(cat "$f")

          "
            TOTAL_LINES=$((TOTAL_LINES + LINES))
            FILES_SENT=$((FILES_SENT + 1))
          done < /tmp/changed-files.txt

          DIFF=$(head -500 /tmp/pr-diff.txt)

          {
            cat "$BASE"
            echo ""
            cat "$STACK"
            # Optional repo-specific addendum from a file inside the
            # consumer repo + the optional inline string. Either or both
            # are appended under a single "Repo-specific notes" heading;
            # file contents render first, inline string second.
            EXTRA_PATH="${{ inputs.extra_prompt_path }}"
            EXTRAS_RENDERED=0
            if [ -n "$EXTRA_PATH" ] && [ -f "$EXTRA_PATH" ]; then
              echo ""
              echo "## Repo-specific notes"
              echo ""
              cat "$EXTRA_PATH"
              EXTRAS_RENDERED=1
            elif [ -n "$EXTRA_PATH" ]; then
              echo "::warning::extra_prompt_path '$EXTRA_PATH' not found in consumer repo — skipping" >&2
            fi
            if [ -n "${{ inputs.extra_prompt }}" ]; then
              if [ "$EXTRAS_RENDERED" -eq 0 ]; then
                echo ""
                echo "## Repo-specific notes"
                echo ""
              fi
              echo "${{ inputs.extra_prompt }}"
            fi
            cat <<'PROMPT_TAIL'

## Review Instructions

Analyze the code and respond with a JSON object:
{
  "summary": "1-3 sentence overview",
  "issues": [
    {
      "file": "path/to/file",
      "line": 42,
      "severity": "critical|high|medium|low",
      "category": "security|bug|performance|logic|style|maintainability|architecture",
      "description": "What's wrong and why",
      "suggestion": "How to fix it"
    }
  ],
  "positives": ["Things done well"],
  "overall_assessment": "approve|comment|request_changes"
}

Focus on actionable findings. Skip trivial style issues. Be concise.
Respond ONLY with the JSON object. No markdown fences.
PROMPT_TAIL
          } > /tmp/review-prompt.txt

          echo "$CODE" > /tmp/review-code.txt
          echo "$DIFF" > /tmp/review-diff.txt

      - name: Call Gemini API
        if: steps.files.outputs.count > 0
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.gemini_api_key }}
          GEMINI_MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail
          PROMPT=$(cat /tmp/review-prompt.txt)
          CODE=$(cat /tmp/review-code.txt)
          DIFF=$(cat /tmp/review-diff.txt)

          FULL_PROMPT="${PROMPT}

          ## Changed Files

          ${CODE}

          ## Git Diff

          ${DIFF}"

          PROMPT_ESCAPED=$(echo "$FULL_PROMPT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          API_URL="https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent"
          RESULT_FILE=/tmp/gemini-result.json

          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s -w "%{http_code}" -o "$RESULT_FILE" \
              "$API_URL" \
              -H 'Content-Type: application/json' \
              -H "X-goog-api-key: ${GEMINI_API_KEY}" \
              --max-time 120 \
              -X POST \
              -d @- <<CURL_EOF
          {
            "contents": [{"parts": [{"text": ${PROMPT_ESCAPED}}]}],
            "generationConfig": {
              "maxOutputTokens": 16384,
              "temperature": 1.0,
              "responseMimeType": "application/json"
            }
          }
          CURL_EOF
            )

            if [ "$HTTP_CODE" = "200" ]; then
              break
            elif [ "$HTTP_CODE" = "429" ] || [ "$HTTP_CODE" = "503" ]; then
              [ "$attempt" -lt 3 ] && sleep $((5 * attempt))
            else
              echo "Gemini API error (HTTP ${HTTP_CODE}):"
              cat "$RESULT_FILE"
              exit 1
            fi
          done

          python3 - <<PYEOF
          import json
          with open("$RESULT_FILE") as f:
              data = json.load(f)
          if "error" in data:
              print(f"ERROR: {data['error']['message']}")
              exit(1)
          text = data["candidates"][0]["content"]["parts"][0]["text"]
          with open("/tmp/gemini-review.json", "w") as f:
              f.write(text)
          PYEOF

      - name: Post review comment
        if: steps.files.outputs.count > 0
        id: post-review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COMMENT=$(python3 << 'PYEOF'
          import json

          with open("/tmp/gemini-review.json") as f:
              review = json.load(f)

          severity_icons = {
              "critical": "🔴",
              "high": "🟡",
              "medium": "🟠",
              "low": "🟢",
          }

          lines = ["### Gemini Code Review", ""]
          lines.append(f"**Summary:** {review.get('summary','(no summary)')}")
          lines.append("")

          issues = review.get("issues") or []
          if issues:
              lines += ["### Findings", ""]
              for issue in issues:
                  icon = severity_icons.get(issue.get("severity", "low"), "⚪")
                  lines.append(f"{icon} **{issue.get('severity','low').upper()}** — `{issue.get('file','?')}:{issue.get('line','?')}` ({issue.get('category','general')})")
                  lines.append(f"> {issue.get('description','')}")
                  if issue.get("suggestion"):
                      lines.append(f"> **Suggestion:** {issue['suggestion']}")
                  lines.append("")
          else:
              lines += ["No issues found.", ""]

          if review.get("positives"):
              lines += ["### What's Well Done"]
              for p in review["positives"]:
                  lines.append(f"- {p}")
              lines.append("")

          assessment_icons = {
              "approve": "✅",
              "comment": "💬",
              "request_changes": "🔄",
          }
          assessment = review.get("overall_assessment", "comment")
          icon = assessment_icons.get(assessment, "💬")
          lines.append(f"**Overall: {icon} {assessment.replace('_',' ').title()}**")
          lines.append("")
          lines.append("---")
          lines.append("*Reviewed by Gemini*")
          print("\n".join(lines))
          PYEOF
          )
          gh pr comment ${{ github.event.pull_request.number || github.event.issue.number }} --body "$COMMENT"

          echo "assessment=$(python3 -c "import json; print(json.load(open('/tmp/gemini-review.json')).get('overall_assessment','comment'))")" >> "$GITHUB_OUTPUT"
          echo "issue_count=$(python3 -c "import json; print(len(json.load(open('/tmp/gemini-review.json')).get('issues', [])))")" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always() && inputs.slack_notify && github.event_name == 'pull_request'
        uses: ./.claude-review-action/actions/slack-notify
        with:
          webhook_url: ${{ secrets.slack_webhook_url }}
          message: |
            💎 *Gemini* reviewed PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
            Repo: ${{ github.repository }} | Assessment: ${{ steps.post-review.outputs.assessment || 'error' }} | Issues: ${{ steps.post-review.outputs.issue_count || '?' }}
            <${{ github.event.pull_request.html_url }}|View PR>
